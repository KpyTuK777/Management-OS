<!DOCTYPE html>
<html lang="uk">

	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">

		<title>Management OS</title>

		<link rel="stylesheet" href="CSS/style.css">
	</head>

	<body>

		<div class="app">

			<!-- SIDEBAR -->

			<aside class="sidebar" id="sidebar"></aside>

			<!-- WORKSPACE -->

			<main>

				<header class="page-header">

					<div>

						<h1>Портфоліо</h1>

						<p>Керуйте своїми проєктами</p>

					</div>

					<button class="btn-primary" id="newProjectBtn">

						+ Новий проєкт

					</button>

				</header>

				<section class="project-filters" aria-label="Фільтри проєктів">

					<label class="project-filter" for="statusFilter">

						<span>Статус</span>

						<select id="statusFilter">

							<option value="Усі">Усі</option>
							<option value="Активний">Активний</option>
							<option value="На паузі">На паузі</option>
							<option value="Завершений">Завершений</option>
							<option value="Архів">Архів</option>

						</select>

					</label>

					<label class="project-filter" for="projectSearch">

						<span>Пошук</span>

						<input
							type="search"
							id="projectSearch"
							placeholder="Пошук за назвою проєкту">

					</label>

				</section>

				<section class="projects-list" id="projectsList">

					<!-- Тут будуть проєкти -->

				</section>

				<!-- Форма створення проєкту -->

				<section class="project-form hidden" id="projectForm">

					<h2>Новий проєкт</h2>

					<div class="form-group">

						<label for="projectName">Назва проєкту</label>

						<input
							type="text"
							id="projectName"
							placeholder="Наприклад: Management OS">

					</div>

					<div class="form-group">

						<label for="projectDescription">Опис</label>

						<textarea
							id="projectDescription"
							rows="4"
							placeholder="Короткий опис проєкту"></textarea>

					</div>

					<button class="btn-primary" id="createProjectBtn">

						Створити проєкт

					</button>

				</section>

			</main>
		</div>

		<script src="js/sidebar.js"></script>
		<script src="js/search.js"></script>
		<script src="js/render-utils.js"></script>
		<script src="js/storage-utils.js"></script>
		<script src="js/storage.js"></script>
		<script src="js/portfolio.js"></script>
		<script src="js/app.js"></script>

	</body>

</html>
