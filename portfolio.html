<!DOCTYPE html>
<html lang="uk">

	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">

		<title>Management OS</title>

		<link rel="stylesheet" href="CSS/style.css">
	</head>

	<body>

		<div class="app">

			<!-- SIDEBAR -->

			<aside class="sidebar">

				<div class="sidebar__logo">

					<h1>Management OS</h1>

					<span>Student Mode</span>

				</div>

				<nav class="sidebar__nav">

					<a class="active" href="#">Поточний фокус</a>

					<a href="#">Робоча пам'ять</a>

					<a href="#">База знань</a>

					<a href="#">Навички</a>

					<a href="#">Налаштування</a>

				</nav>

			</aside>

			<!-- WORKSPACE -->

			<main>

				<header class="page-header">

					<div>

						<h1>Портфоліо</h1>

						<p>Керуйте своїми проєктами</p>

					</div>

					<button class="btn-primary" id="newProjectBtn">

						+ Новий проєкт

					</button>

				</header>

				<section class="projects-list" id="projectsList">

					<!-- Тут будуть проєкти -->

				</section>

				<!-- Форма створення проєкту -->

				<section class="project-form hidden" id="projectForm">

					<h2>Новий проєкт</h2>

					<div class="form-group">

						<label for="projectName">Назва проєкту</label>

						<input
							type="text"
							id="projectName"
							placeholder="Наприклад: Management OS">

					</div>

					<div class="form-group">

						<label for="projectDescription">Опис</label>

						<textarea
							id="projectDescription"
							rows="4"
							placeholder="Короткий опис проєкту"></textarea>

					</div>

					<button class="btn-primary" id="createProjectBtn">

						Створити проєкт

					</button>

				</section>

			</main>
		</div>

		<script src="js/storage.js"></script>
		<script src="js/portfolio.js"></script>
		<script src="js/app.js"></script>

	</body>

</html>
