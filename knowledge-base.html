<!DOCTYPE html>
<html lang="uk">

	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">

		<title>База знань — Management OS</title>

		<link rel="stylesheet" href="CSS/style.css">
	</head>

	<body>

		<div class="app">

			<aside class="sidebar" id="sidebar"></aside>

			<main>

				<header class="page-header">

					<div>

						<h1>База знань</h1>

						<p>Зберігайте рішення, інструкції, шаблони та важливі знання.</p>

					</div>

					<button class="btn-primary" type="button" data-action="new-entry">

						+ Створити запис

					</button>

				</header>

				<form class="knowledge-form hidden" id="knowledgeEntryForm">

					<h2>Новий запис</h2>

					<div class="form-group">

						<label for="knowledgeTitle">Назва</label>

						<input type="text" id="knowledgeTitle" required>

					</div>

					<div class="form-group">

						<label for="knowledgeCategory">Категорія</label>

						<select id="knowledgeCategory" required></select>

						<button class="knowledge-category-toggle" type="button" id="newCategoryBtn">

							+ Нова категорія

						</button>

						<div class="knowledge-category-form hidden" id="knowledgeCategoryForm">

							<label for="newCategoryName">Назва категорії</label>

							<input type="text" id="newCategoryName">

							<div class="knowledge-category-form__actions">

								<button class="btn-primary" type="button" id="addCategoryBtn">Додати</button>

								<button class="btn-secondary" type="button" id="cancelCategoryBtn">Скасувати</button>

							</div>

						</div>

					</div>

					<div class="form-group">

						<label for="knowledgeSummary">Короткий опис</label>

						<textarea id="knowledgeSummary" rows="3" required></textarea>

					</div>

					<div class="form-group">

						<label for="knowledgeContent">Вміст</label>

						<textarea id="knowledgeContent" rows="8" required></textarea>

					</div>

					<button class="btn-primary" type="submit" id="knowledgeSubmitBtn">Зберегти запис</button>

				</form>

				<section class="project-filters knowledge-search hidden" id="knowledgeSearch" aria-label="Пошук знань">

					<label class="project-filter" for="knowledgeSearchInput">

						<span>Пошук</span>

						<input
							type="search"
							id="knowledgeSearchInput"
							placeholder="Пошук знань...">

					</label>

				</section>

				<section class="knowledge-entries hidden" id="knowledgeEntriesList" aria-live="polite"></section>

				<section class="knowledge-empty-state" id="knowledgeEmptyState">

					<div class="knowledge-empty-state__content">

						<h2>Знань поки що немає.</h2>

						<button class="btn-primary" type="button" data-action="new-entry">

							Створити запис

						</button>

					</div>

				</section>

			</main>

		</div>

		<script src="js/sidebar.js"></script>
		<script src="js/search.js"></script>
		<script src="js/render-utils.js"></script>
		<script src="js/storage-utils.js"></script>
		<script src="js/storage.js"></script>
		<script src="js/knowledge-base.js"></script>

	</body>

</html>
