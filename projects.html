<!DOCTYPE html>
<html lang="uk">

	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">

		<title>Management OS</title>

		<link rel="stylesheet" href="CSS/style.css">
	</head>

	<body>

		<div class="app">

			<!-- SIDEBAR -->

			<aside class="sidebar">

				<div class="sidebar__logo">

					<h1>Management OS</h1>

					<span>Student Mode</span>

				</div>

				<nav class="sidebar__nav">

					<a class="active" href="#">Поточний фокус</a>

					<a href="#">Робоча пам'ять</a>

					<a href="#">База знань</a>

					<a href="#">Навички</a>

					<a href="#">Налаштування</a>

				</nav>

			</aside>

			<!-- WORKSPACE -->

			<main>
				<header class="page-header">

					<div>

						<h1>Projects</h1>

						<p>Керуйте всіма своїми проєктами в одному місці.</p>

					</div>

					<button class="primary-btn">

						+ New Project

					</button>

				</header>
				<section class="project-filters">

					<button class="filter active">All</button>

					<button class="filter">Active</button>

					<button class="filter">Completed</button>

					<button class="filter">Archived</button>

				</section>

				<section class="portfolio-overview">

					<div class="overview-card">

						<span>Active</span>
						<h2>4</h2>

					</div>

					<div class="overview-card">

						<span>Completed</span>
						<h2>12</h2>

					</div>

					<div class="overview-card">

						<span>At Risk</span>
						<h2>1</h2>

					</div>

					<div class="overview-card">

						<span>Focus</span>
						<h2>2</h2>

					</div>

				</section>
			</main>

		</div>

		<script src="./js/script.js"></script>

	</body>

</html>
